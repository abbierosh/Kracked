<!doctype html>
<html lang="en-SG">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRacked Dessert Mood Read</title>
  <meta name="description" content="Find out what pastry mood you're craving today.">
  <style>
    :root {
      --ink: #f7f1e8;
      --muted: #b9ad9b;
      --paper: #070605;
      --panel: rgba(13, 11, 9, 0.9);
      --panel-strong: rgba(18, 15, 12, 0.96);
      --cream: #f0e2cf;
      --line: rgba(240, 226, 207, 0.16);
      --line-strong: rgba(240, 226, 207, 0.34);
      --gold: #c6a261;
      --gold-bright: #e4c77f;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(0,0,0,0.92), rgba(0,0,0,0.75) 48%, rgba(0,0,0,0.5)),
        linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.72)),
        url("kracked-bg.png") center right / cover fixed no-repeat,
        var(--paper);
    }

    button, input { font: inherit; }
    a { color: inherit; }

    .app {
      width: min(980px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      align-items: center;
    }

    .shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0,0,0,0.6);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 68px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,0.22);
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(240,226,207,0.2);
      border-radius: 50%;
      background: #050403;
      box-shadow: 0 12px 34px rgba(0,0,0,0.45), 0 0 0 6px rgba(198,162,97,0.06);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .brand-name {
      margin: 0;
      color: var(--gold-bright);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      width: 86px;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(240,226,207,0.15);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--gold);
      transition: width 180ms ease;
    }

    .step-count {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .screen {
      min-height: min(590px, calc(100vh - 160px));
      padding: clamp(24px, 5vw, 46px);
      display: grid;
      align-content: center;
    }

    .screen.intro-screen {
      min-height: auto;
      padding-block: clamp(34px, 7vw, 72px);
    }

    .screen.result-screen {
      align-content: start;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--gold-bright);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    h1 {
      max-width: 720px;
      margin-bottom: 18px;
      color: var(--cream);
      font-size: clamp(44px, 7vw, 78px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    h2 {
      max-width: 760px;
      margin-bottom: 10px;
      color: var(--cream);
      font-size: clamp(34px, 5vw, 60px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    h3 {
      color: var(--cream);
      letter-spacing: 0;
    }

    .copy {
      max-width: 650px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.52;
    }

    .meta {
      margin: 22px 0 0;
      color: var(--gold-bright);
      font-size: 13px;
      font-weight: 850;
    }

    .btn {
      min-height: 48px;
      border: 1px solid rgba(240,226,207,0.22);
      border-radius: var(--radius);
      padding: 12px 17px;
      color: var(--ink);
      background: rgba(255,255,255,0.055);
      cursor: pointer;
      font-weight: 850;
      text-decoration: none;
      text-align: center;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(228,199,127,0.62);
      background: rgba(255,255,255,0.08);
    }

    .btn:focus-visible,
    .choice:focus-visible,
    .seg:focus-visible {
      outline: 3px solid rgba(228,199,127,0.92);
      outline-offset: 3px;
    }

    .btn-primary {
      border-color: rgba(198,162,97,0.72);
      color: #130f0a;
      background: linear-gradient(180deg, #edcf84, #bd9350);
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
    }

    .btn-ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .btn[hidden] { display: none; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .choices--checklist {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .choice {
      position: relative;
      min-height: 132px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--ink);
      background:
        radial-gradient(circle at 88% 14%, rgba(198,162,97,0.12), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
      cursor: pointer;
      text-align: left;
      display: grid;
      align-content: space-between;
      gap: 16px;
    }

    .choice--compact {
      min-height: 76px;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      align-content: center;
      gap: 12px;
      padding: 14px;
    }

    .choice--compact .choice-icon {
      width: 34px;
      height: 34px;
    }

    .choice--compact .choice-icon svg {
      width: 20px;
      height: 20px;
    }

    .choice--compact .choice-title {
      font-size: 18px;
    }

    .choice--compact .choice-tags {
      grid-column: 2;
      margin-top: -6px;
      font-size: 12px;
    }

    .choice--compact.is-selected::after {
      position: absolute;
      top: 12px;
      right: 12px;
      content: "Selected";
      color: var(--gold-bright);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .choice::before {
      position: absolute;
      inset: 0;
      content: "";
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(228,199,127,0.28), transparent 34%);
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
    }

    .choice:hover,
    .choice.is-selected {
      border-color: rgba(228,199,127,0.72);
      background:
        linear-gradient(145deg, rgba(198,162,97,0.22), rgba(255,255,255,0.055));
      box-shadow: inset 0 0 0 1px rgba(228,199,127,0.12), 0 16px 34px rgba(0,0,0,0.24);
    }

    .choice:hover::before,
    .choice.is-selected::before {
      opacity: 1;
    }

    .choice-icon {
      position: relative;
      z-index: 1;
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(228,199,127,0.38);
      border-radius: 50%;
      color: var(--gold-bright);
      background: rgba(198,162,97,0.08);
      box-shadow: inset 0 0 18px rgba(198,162,97,0.08);
    }

    .choice-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .choice.is-selected .choice-icon,
    .choice:hover .choice-icon {
      color: #130f0a;
      border-color: rgba(228,199,127,0.9);
      background: var(--gold-bright);
      box-shadow: 0 0 28px rgba(228,199,127,0.22);
    }

    .choice-title {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--cream);
      font-size: clamp(21px, 3vw, 28px);
      font-weight: 900;
      line-height: 1.1;
    }

    .choice-tags {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .helper {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      margin: 14px 0 0;
      color: #f3c0ad;
      font-size: 13px;
      font-weight: 750;
    }

    .tune-grid {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    legend {
      padding: 0;
    }

    .tune-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.55fr) minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background:
        linear-gradient(145deg, rgba(198,162,97,0.1), rgba(255,255,255,0.035));
    }

    .tune-label {
      color: var(--cream);
      font-weight: 900;
    }

    .segments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(240,226,207,0.12);
      border-radius: 10px;
      background: rgba(0,0,0,0.22);
    }

    .seg {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
    }

    .seg.is-selected {
      border-color: rgba(228,199,127,0.78);
      color: #120f0b;
      background: var(--gold-bright);
    }

    .result-head {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid rgba(228,199,127,0.22);
      border-radius: 14px;
      background:
        radial-gradient(circle at 90% 12%, rgba(228,199,127,0.14), transparent 30%),
        rgba(255,255,255,0.04);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border: 1px solid rgba(228,199,127,0.32);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--gold-bright);
      background: rgba(198,162,97,0.1);
      font-size: 12px;
      font-weight: 850;
    }

    .idea-panel,
    .discount-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.045);
    }

    .idea-panel {
      margin: 20px 0 22px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
    }

    .idea-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .idea-list li {
      border: 1px solid rgba(240,226,207,0.18);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--cream);
      background: rgba(0,0,0,0.16);
      font-size: 13px;
      font-weight: 750;
    }

    .result-hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(260px, 1.08fr);
      gap: 22px;
      align-items: stretch;
    }

    .product-image {
      min-height: 340px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: center / cover no-repeat;
      box-shadow: inset 0 -90px 90px rgba(0,0,0,0.3);
    }

    .main-pick {
      display: grid;
      align-content: start;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: clamp(20px, 4vw, 30px);
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 1px rgba(228,199,127,0.07);
    }

    .main-pick h3 {
      margin-bottom: 0;
      color: var(--cream);
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.02;
    }

    .price {
      color: var(--gold-bright);
      font-size: 13px;
      font-weight: 900;
    }

    .reason {
      color: var(--muted);
      line-height: 1.45;
    }

    .discount-box {
      margin-top: 10px;
      background:
        radial-gradient(circle at 92% 10%, rgba(228,199,127,0.16), transparent 28%),
        rgba(255,255,255,0.045);
    }

    .discount-box h4 {
      margin-bottom: 8px;
      color: var(--cream);
      font-size: 18px;
      line-height: 1.25;
    }

    .code-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .discount-code {
      border: 1px solid rgba(228,199,127,0.42);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--gold-bright);
      background: rgba(0,0,0,0.22);
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .secondary {
      margin-top: 22px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .mini-product {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255,255,255,0.045);
    }

    .mini-image {
      min-height: 132px;
      border-radius: 6px;
      background: center / cover no-repeat;
    }

    .mini-product > div:last-child {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .mini-product h4 {
      margin-bottom: 6px;
      color: var(--cream);
      font-size: 19px;
      line-height: 1.12;
    }

    .mini-product .reason {
      flex: 1;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .mini-product .btn {
      min-height: 42px;
      padding: 10px 14px;
      align-self: flex-start;
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      body { background-attachment: scroll; }
      .app { align-items: start; padding: 14px 0; width: min(100% - 20px, 1040px); }
      .topbar { padding: 12px; }
      .brand-logo { width: 44px; height: 44px; }
      .brand-name { font-size: 11px; }
      .progress-track { width: 58px; }
      .screen { min-height: auto; padding: 22px; }
      h1 { font-size: clamp(42px, 14vw, 62px); }
      h2 { font-size: clamp(32px, 10vw, 48px); }
      .choices { grid-template-columns: 1fr; gap: 10px; }
      .choice { min-height: 104px; padding: 17px; }
      .choice--compact { min-height: 72px; padding: 13px; }
      .choice--compact .choice-tags { grid-column: 2; }
      .tune-row { grid-template-columns: 1fr; }
      .segments { grid-template-columns: 1fr; }
      .result-hero { grid-template-columns: 1fr; }
      .product-image { min-height: 280px; }
      .product-grid { grid-template-columns: 1fr; }
      .mini-product { grid-template-columns: 96px minmax(0, 1fr); }
      .mini-image { min-height: 112px; }
      .actions .btn, .main-pick .btn { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="KRacked dessert mood read">
      <div class="topbar">
        <div class="brand-mark">
          <img class="brand-logo" src="https://emofly.b-cdn.net/hbd_exvhac6ayb3ZKT/width:256/plain/https%3A%2F%2Fstorage.googleapis.com%2Ftakeapp%2Fmedia%2Fcmmmfa3ml000004l42e17909a.png" alt="KRackedbakes logo">
          <p class="brand-name">KRacked</p>
        </div>
        <button class="btn btn-ghost" id="backButton" type="button" hidden>Back</button>

            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="step-count" id="stepCopy">1 of 6</p>
        </div>
      </div>
      <div class="screen" id="screen" tabindex="-1"></div>
    </section>
  </main>

  <script>

          dims: { dark: 4, rich: 2, chew: 1 },
          followups: [
            { id: "brownie", icon: "square", title: "Fudgy Brownie", tags: "dense · dark · rich", dims: { dark: 2, rich: 3 } },

      ],

        { id: "halfway", icon: "swirl", title: "Meet Me Halfway", tags: "balanced · small twist", dims: { familiarity: 1, adventurous: 1 } },
        { id: "surprise", icon: "spark", title: "Surprise Me", tags: "bold · strange · new", dims: { adventurous: 3, novelty: 1 } }
      ],
      profileOrder: ["dark", "butter", "cream", "bright", "local", "novelty"]
    };

    const productById = Object.fromEntries(quiz.products.map((product) => [product.id, product]));
    let state = defaultState();

    const screen = document.getElementById("screen");
    const backButton = document.getElementById("backButton");
    const progress = document.getElementById("progress");
    const progressFill = document.getElementById("progressFill");
    const stepCopy = document.getElementById("stepCopy");

    init();

    function defaultState() {
      return {
        sessionId: getOrCreateSession(),
        step: 0,
        answers: { textures: [], intensity: { sweetness: "balanced", richness: "medium", familiarity: "twist" } },
        result: null,
        discountCode: ""
      };
    }

    function init() {
      const restored = readJson(STORAGE.state);
      if (restored && restored.sessionId) state = normalizeState(restored);
      window.addEventListener("hashchange", syncFromHash);
      window.addEventListener("popstate", syncFromHash);
      backButton.addEventListener("click", goBack);
      syncFromHash();
    }

    function normalizeState(restored) {
      const fresh = defaultState();
      const answers = restored.answers || {};
      return {
        ...fresh,
        ...restored,
        answers: {
          ...fresh.answers,
          ...answers,
          textures: Array.isArray(answers.textures) ? answers.textures : [],
          intensity: {
            ...fresh.answers.intensity,
            ...(answers.intensity || {})
          }
        },
        result: restored.result || readJson(STORAGE.result) || null,
        discountCode: restored.discountCode || safeGet(STORAGE.code) || ""
      };
    }

    function syncFromHash() {
      const target = parseHash();
      if (target === "result" && state.result) {
        state.step = 7;
        render();
        return;
      }
      if (target.startsWith("q")) {
        const step = Number(target.slice(1));
        if (Number.isInteger(step) && step >= 1 && step <= 6) state.step = Math.min(step, maxReachableStep());
      } else {
        state.step = 0;
      }
      render();
    }

    function parseHash() {
      return (window.location.hash || "#intro").replace("#", "");
    }

    function maxReachableStep() {
      if (!state.answers.family) return 1;
      if (!state.answers.followup) return 2;
      if (!state.answers.textures?.length) return 3;
      if (!state.answers.moment) return 5;
      if (!state.answers.openness) return 6;
      return 6;
    }

    function setHash(value) {
      if (window.location.hash !== `#${value}`) window.history.pushState(null, "", `#${value}`);
    }

    function persist() {
      writeJson(STORAGE.state, state);
      if (state.result) writeJson(STORAGE.result, state.result);
      if (state.discountCode) safeSet(STORAGE.code, state.discountCode);
    }

    function render() {
      const isIntro = state.step === 0;
      const isResult = state.step === 7;
      backButton.hidden = state.step <= 1 || isIntro || isResult;
      progress.hidden = isIntro || isResult;
      progressFill.style.width = `${Math.max(0, Math.min(100, (state.step / 6) * 100))}%`;
      stepCopy.textContent = `${Math.min(state.step, 6)} of 6`;
      screen.className = `screen${isIntro ? " intro-screen" : ""}${isResult ? " result-screen" : ""}`;

      if (isIntro) renderIntro();
      else if (isResult) renderResult();
      else renderQuestion();

      requestAnimationFrame(() => screen.focus({ preventScroll: true }));
      persist();
    }

    function renderIntro() {
      screen.innerHTML = `
        <p class="eyebrow">Dessert mood read</p>
        <h1>Find out what you&rsquo;re craving.</h1>
        <p class="copy">Sweet tooth changes by the day. Pick what sounds good right now and we&rsquo;ll read the pastry mood.</p>
        <p class="meta">6 quick reads · under 45 seconds</p>
        <div class="actions">
          <button class="btn btn-primary" id="startButton" type="button">Let's find out</button>
        </div>
      `;
      document.getElementById("startButton").addEventListener("click", () => {
        analyticsTrack("quiz_start", eventBase());
        state.step = 1;
        setHash("q1");
        render();
      });
    }

    function renderQuestion() {
      const question = getQuestion();
      const helper = question.helper ? `<p class="helper">${escapeHtml(question.helper)}</p>` : "";
      screen.innerHTML = `
        <fieldset>
          <legend>
            <p class="eyebrow">${escapeHtml(question.eyebrow)}</p>
            <h2>${escapeHtml(question.prompt)}</h2>
          </legend>
          ${helper}
          ${question.type === "multi" ? renderMulti(question) : question.type === "intensity" ? renderIntensity() : renderSingle(question)}
        </fieldset>
        <p class="error" id="stepError" hidden></p>
        ${question.needsContinue ? `<div class="actions"><button class="btn btn-primary" id="continueButton" type="button">${escapeHtml(question.continueLabel)}</button></div>` : ""}
      `;

      analyticsTrack("step_view", eventBase({ step: state.step, step_type: question.type }));
      if (question.type === "multi") bindMulti(question);
      else if (question.type === "intensity") bindIntensity();
      else bindSingle(question);
      if (question.needsContinue) document.getElementById("continueButton").addEventListener("click", continueFromStep);
    }

    function getQuestion() {
      if (state.step === 1) {
        return { type: "single", eyebrow: "Craving read", prompt: "Where is the craving leaning?", options: Object.values(quiz.families), answerKey: "family" };
      }
      if (state.step === 2) {
        const family = quiz.families[state.answers.family] || quiz.families.dark;
        return { type: "single", eyebrow: "Craving read", prompt: family.prompt, options: family.followups, answerKey: "followup" };
      }
      if (state.step === 3) {
        return { type: "multi", eyebrow: "Texture read", prompt: "What needs to happen in the bite?", helper: "Pick up to 2.", options: quiz.textureOptions, needsContinue: true, continueLabel: "Continue" };
      }
      if (state.step === 4) {
        return { type: "intensity", eyebrow: "Tuning", prompt: "Set the intensity.", needsContinue: true, continueLabel: "Continue" };
      }
      if (state.step === 5) {
        return { type: "single", eyebrow: "Eating moment", prompt: "When are you eating this?", options: quiz.moments, answerKey: "moment" };
      }
      return { type: "single", eyebrow: "Final read", prompt: "How far should we stretch you?", options: quiz.openness, answerKey: "openness" };
    }

    function renderSingle(question) {
      return `<div class="choices" role="group" aria-label="${escapeHtml(question.prompt)}">
        ${question.options.map((option) => choiceButton(option, state.answers[question.answerKey] === option.id)).join("")}
      </div>`;
    }

    function renderMulti(question) {
      const selected = new Set(state.answers.textures || []);
      return `<div class="choices choices--checklist" role="group" aria-label="${escapeHtml(question.prompt)}">
        ${question.options.map((option) => choiceButton(option, selected.has(option.id), true)).join("")}
      </div>`;
    }

    function choiceButton(option, selected, checkbox = false) {
      return `
        <button class="choice${checkbox ? " choice--compact" : ""}${selected ? " is-selected" : ""}" type="button" data-option="${option.id}" aria-pressed="${selected}" ${checkbox ? `aria-label="${escapeHtml(option.title)} ${selected ? "selected" : "not selected"}"` : ""}>
          <span class="choice-icon" aria-hidden="true">${iconSvg(option.icon)}</span>
          <span class="choice-title">${escapeHtml(option.title)}</span>
          <span class="choice-tags">${escapeHtml(option.tags)}</span>
        </button>
      `;
    }

    function renderIntensity() {
      const controls = [
        ["sweetness", "Sweetness", [["gentle", "gentle"], ["balanced", "balanced"], ["full", "full-send"]]],
        ["richness", "Richness", [["light", "light"], ["medium", "medium"], ["dense", "dense"]]],
        ["familiarity", "Adventure", [["classic", "classic"], ["twist", "twist"], ["adventurous", "adventurous"]]]
      ];
      return `<div class="tune-grid">
        ${controls.map(([key, label, options]) => `
          <div class="tune-row">
            <span class="tune-label">${label}: ${escapeHtml(labelForIntensity(key))}</span>
            <div class="segments" role="group" aria-label="${label}">
              ${options.map(([value, text]) => `<button class="seg${state.answers.intensity[key] === value ? " is-selected" : ""}" type="button" data-intensity="${key}" data-value="${value}">${text}</button>`).join("")}
            </div>
          </div>
        `).join("")}
      </div>`;
    }

    function labelForIntensity(key) {
      const labels = {
        sweetness: { gentle: "gentle", balanced: "balanced", full: "full-send" },
        richness: { light: "light", medium: "medium", dense: "dense" },
        familiarity: { classic: "classic", twist: "twist", adventurous: "adventurous" }
      };
      return labels[key]?.[state.answers.intensity[key]] || state.answers.intensity[key];
    }

    function bindSingle(question) {
      screen.querySelectorAll(".choice").forEach((button) => {
        button.addEventListener("click", () => {
          state.answers[question.answerKey] = button.dataset.option;
          if (question.answerKey === "family") {
            state.answers.followup = "";
          }
          analyticsTrack("answer_select", eventBase({ step: state.step, answer_id: button.dataset.option }));
          setTimeout(() => advance(), 150);
        });
      });
    }

    function bindMulti() {
      screen.querySelectorAll(".choice").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.option;
          const selected = new Set(state.answers.textures || []);
          if (selected.has(id)) selected.delete(id);
          else if (selected.size < 2) selected.add(id);
          else {
            showError("Pick up to 2 textures.");
            return;
          }
          state.answers.textures = [...selected];
          analyticsTrack("texture_select", eventBase({ textures: state.answers.textures.join(",") }));
          renderQuestion();
        });
      });
    }

    function bindIntensity() {
      screen.querySelectorAll(".seg").forEach((button) => {
        button.addEventListener("click", () => {
          state.answers.intensity[button.dataset.intensity] = button.dataset.value;
          analyticsTrack("intensity_set", eventBase({ key: button.dataset.intensity, value: button.dataset.value }));
          renderQuestion();
        });
      });
    }

    function continueFromStep() {
      if (state.step === 3 && (!state.answers.textures || state.answers.textures.length === 0)) {
        showError("Pick at least 1 texture.");
        return;
      }
      advance();
    }

    function showError(message) {
      const error = document.getElementById("stepError");
      error.textContent = message;
      error.hidden = false;
    }

    function advance() {
      if (state.step < 6) {
        state.step += 1;
        setHash(`q${state.step}`);
        render();
      } else {
        completeQuiz();
      }
    }

    function goBack() {
      if (state.step <= 1) return;
      state.step -= 1;
      setHash(`q${state.step}`);
      render();
    }

    function completeQuiz() {
      state.result = computeResult();
      state.discountCode = assignDiscountCode();
      state.step = 7;
      writeJson(STORAGE.result, state.result);
      safeSet(STORAGE.code, state.discountCode);
      analyticsTrack("quiz_complete", eventBase({ profile: state.result.profile.id, product: state.result.main.product.id, confidence: state.result.confidence }));
      setHash("result");
      render();
    }

    function computeResult() {
      const dims = {};
      addDims(dims, quiz.families[state.answers.family]?.dims);
      const followup = quiz.families[state.answers.family]?.followups.find((option) => option.id === state.answers.followup);
      addDims(dims, followup?.dims);
      (state.answers.textures || []).forEach((id) => addDims(dims, quiz.textureOptions.find((option) => option.id === id)?.dims));
      addIntensityDims(dims);
      addDims(dims, quiz.moments.find((option) => option.id === state.answers.moment)?.dims);
      addDims(dims, quiz.openness.find((option) => option.id === state.answers.openness)?.dims);

      const family = quiz.families[state.answers.family] || quiz.families.dark;
      const profile = {
        id: family.id,
        name: family.profile,
        description: family.description,
        ideas: family.ideas,
        tags: resultTags(dims)
      };

      const rankedProducts = quiz.products
        .map((product) => ({ product, score: scoreProduct(dims, product), reason: productReason(family.id, product.id) }))
        .sort((a, b) => b.score - a.score);
      const main = rankedProducts[0];
      const secondary = rankedProducts.slice(1, 3);
      const gap = main.score - rankedProducts[1].score;
      const familyCovered = family.id !== "local" || main.product.id === "french_brioche_loaf";
      const confidence = family.id === "local" ? "weak" : gap >= 5 ? "strong" : gap >= 2 ? "medium" : "weak";
      return { profile, dims, main, secondary, confidence, familyCovered };
    }

    function addDims(target, dims = {}) {
      Object.entries(dims).forEach(([key, value]) => {
        target[key] = (target[key] || 0) + value;
      });
    }

    function addIntensityDims(dims) {
      const { sweetness, richness, familiarity } = state.answers.intensity;
      if (sweetness === "gentle") addDims(dims, { sweet: -1, familiarity: 1 });
      if (sweetness === "balanced") addDims(dims, { sweet: 1 });
      if (sweetness === "full") addDims(dims, { sweet: 3, rich: 1 });
      if (richness === "light") addDims(dims, { rich: -1, cream: 1 });
      if (richness === "medium") addDims(dims, { rich: 1 });
      if (richness === "dense") addDims(dims, { rich: 3, dark: 1 });
      if (familiarity === "classic") addDims(dims, { familiarity: 3 });
      if (familiarity === "twist") addDims(dims, { novelty: 1, adventurous: 1 });
      if (familiarity === "adventurous") addDims(dims, { novelty: 2, adventurous: 3 });
    }

    function scoreProduct(dims, product) {
      return Object.entries(product.dims).reduce((sum, [key, value]) => sum + (dims[key] || 0) * value, 0);
    }

    function productReason(familyId, productId) {
      if (familyId === "local") {
        return "KRacked does not currently have a kaya or pandan bake on the menu, but this is the closest live bridge for the craving you built.";
      }
      const reasons = {
        hot_cocoa_cookies: "Best fit for a cocoa-led craving with a soft comfort finish.",
        brookies: "Best when the craving leans dense, chewy, and hybrid.",
        tiramisu_rolls: "Best when the craving wants cream, coffee, and a softer landing.",
        french_brioche_loaf: "Best when the craving is buttery, soft, and low-drama.",
        streuseltalers: "Best when the craving needs fruit lift and crumbly texture."
      };
      return reasons[productId] || "Closest fit on the current menu.";
    }

    function resultTags(dims) {
      return Object.entries(dims)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([key]) => ({
          lateNight: "late-night",
          novelty: "curveball",
          adventurous: "adventurous",
          familiarity: "familiar",
          brunch: "brunch",
          chew: "chewy",
          soft: "soft",
          rich: "rich",
          bright: "bright",
          fruity: "fruity",
          butter: "buttery",
          cream: "creamy",
          dark: "cocoa",
          local: "nostalgic",
          sharing: "sharing"
        }[key] || key));
    }

    function renderResult() {
      const result = state.result || readJson(STORAGE.result);
      if (!result) {
        state.step = 0;
        setHash("intro");
        render();
        return;
      }
      state.result = result;
      const label = result.confidence === "strong" ? "Your KRacked match" : result.confidence === "medium" ? "Closest KRacked match right now" : "Closest fit on the current menu";
      const code = assignDiscountCode();
      screen.innerHTML = `
        <div class="result-head">
          <p class="eyebrow">Your craving profile is...</p>
          <h2>${escapeHtml(result.profile.name)}</h2>
          <p class="copy">${escapeHtml(result.profile.description)}</p>
          <div class="tag-row">${result.profile.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        </div>

        <section class="idea-panel">
          <p class="eyebrow">You'd probably like...</p>
          <ul class="idea-list">${result.profile.ideas.map((idea) => `<li>${escapeHtml(idea)}</li>`).join("")}</ul>
        </section>

        <div class="result-hero">
          <div class="product-image" style="background-image: url('${result.main.product.image}')"></div>
          <article class="main-pick">
            <p class="eyebrow">${escapeHtml(label)}</p>
            <h3>${escapeHtml(result.main.product.name)}</h3>
            <p class="price">${escapeHtml(result.main.product.priceLabel)}</p>
            <p class="reason">${escapeHtml(result.main.reason)}</p>
            <a class="btn btn-primary" href="${result.main.product.linkUrl}" target="_blank" rel="noopener" data-product-id="${result.main.product.id}" data-slot="main">Order this bake</a>
            <div class="discount-box">
              <p class="eyebrow">5% test code</p>
              <h4>Use code ${escapeHtml(code)} for 5% off your order.</h4>
              <div class="code-row">
                <span class="discount-code">${escapeHtml(code)}</span>
                <button class="btn" id="copyCodeButton" type="button">Copy code</button>
              </div>
              <p class="note">Test code for now — we'll confirm validity before launch.</p>
            </div>
          </article>
        </div>

        <section class="secondary">
          <p class="eyebrow">Also worth a look</p>
          <div class="product-grid">${result.secondary.map((item) => secondaryCard(item)).join("")}</div>
        </section>

        <div class="actions">
          <button class="btn" id="retakeButton" type="button">Retake</button>
          <button class="btn btn-ghost" id="copyResultButton" type="button">Copy my result</button>
        </div>
      `;
      bindResultActions(result, code);
    }

    function secondaryCard(item) {
      return `
        <article class="mini-product">
          <div class="mini-image" style="background-image: url('${item.product.image}')"></div>
          <div>
            <p class="eyebrow">Worth a look</p>
            <h4>${escapeHtml(item.product.name)}</h4>
            <p class="reason">${escapeHtml(item.reason)}</p>
            <a class="btn" href="${item.product.linkUrl}" target="_blank" rel="noopener" data-product-id="${item.product.id}" data-slot="secondary">View bake</a>
          </div>
        </article>
      `;
    }

    function bindResultActions(result, code) {
      screen.querySelectorAll("[data-product-id]").forEach((link) => {
        link.addEventListener("click", () => analyticsTrack("product_cta_click", eventBase({ product_id: link.dataset.productId, slot: link.dataset.slot })));
      });
      document.getElementById("retakeButton").addEventListener("click", () => {
        analyticsTrack("retake_quiz", eventBase({ profile: result.profile.id }));
        resetQuiz();
      });
      document.getElementById("copyResultButton").addEventListener("click", async () => {
        analyticsTrack("copy_result", eventBase({ profile: result.profile.id }));
        await copyText(`My pastry mood today is ${result.profile.name}. I'd probably like ${result.profile.ideas.slice(0, 3).join(", ")}. Closest KRacked match: ${result.main.product.name}.`, "copyResultButton");
      });
      document.getElementById("copyCodeButton").addEventListener("click", async () => {
        analyticsTrack("copy_code", eventBase({ code }));
        await copyText(`Use code ${code} for 5% off your order.`, "copyCodeButton", `Code: ${code}`);
      });
    }

    function resetQuiz() {
      clearStorage();
      state = defaultState();
      setHash("intro");
      render();
    }

    function assignDiscountCode() {
      if (state.discountCode) return state.discountCode;
      const stored = safeGet(STORAGE.code);
      if (stored && quiz.discountCodes.includes(stored)) {
        state.discountCode = stored;
        return stored;
      }
      const code = quiz.discountCodes[Math.floor(Math.random() * quiz.discountCodes.length)];
      state.discountCode = code;
      safeSet(STORAGE.code, code);
      return code;
    }

    async function copyText(text, buttonId, fallbackText = "Copy failed") {
      const button = document.getElementById(buttonId);
      const original = button.textContent;
      try {
        if (!navigator.clipboard) throw new Error("Clipboard unavailable");
        await navigator.clipboard.writeText(text);
        button.textContent = "Copied";
      } catch {
        button.textContent = fallbackText;
      }
      setTimeout(() => {
        button.textContent = original;
      }, 1800);
    }

    function iconSvg(icon) {
      const icons = {
        cocoa: '<svg viewBox="0 0 32 32"><path d="M15 4c-4 5-7 9-7 14a7 7 0 0 0 14 0c0-5-3-9-7-14Z"></path><rect x="18" y="18" width="7" height="7" rx="1.5"></rect></svg>',
        bread: '<svg viewBox="0 0 32 32"><path d="M6 22v-4a10 10 0 0 1 20 0v4Z"></path><path d="M10 22v-5a6 6 0 0 1 12 0v5"></path><path d="M8 25h16"></path></svg>',
        cup: '<svg viewBox="0 0 32 32"><path d="M9 17c0-4 3-7 7-7 3 0 6 2 6 5s-2.5 5-6 5h-5"></path><path d="M11 22h10"></path><path d="M23 14h2a3 3 0 0 1 0 6h-3"></path></svg>',
        citrus: '<svg viewBox="0 0 32 32"><path d="M8 24A16 16 0 0 1 24 8v16Z"></path><path d="M13 22 24 11M16 24V13M21 24V10"></path><path d="M6 8l2 2M5 15h3M12 5v3"></path></svg>',
        pandan: '<svg viewBox="0 0 32 32"><path d="M25 6C14 7 8 13 8 24c9 0 15-6 17-18Z"></path><path d="M8 24c4-6 8-10 15-13"></path><circle cx="22" cy="23" r="1.4"></circle><circle cx="18" cy="25" r="1.4"></circle></svg>',
        wildcard: '<svg viewBox="0 0 32 32"><path d="M7 9h8l-3 6h7l-6 10"></path><path d="m22 7 1.2 3.1L26 11l-2.8 1-1.2 3-1.2-3-2.8-1 2.8-.9Z"></path></svg>',
        drop: '<svg viewBox="0 0 32 32"><path d="M16 4C12 9 9 13 9 18a7 7 0 0 0 14 0c0-5-3-9-7-14Z"></path><path d="M13 21c1.2 1.3 3.2 1.7 5 .6"></path></svg>',
        swirl: '<svg viewBox="0 0 32 32"><path d="M8 17c0-5 4-9 9-9 4 0 7 3 7 6 0 4-3 6-7 6h-5"></path><path d="M12 20c0 3 3 5 6 5 2.8 0 5-1.4 6-3.8"></path></svg>',
        arch: '<svg viewBox="0 0 32 32"><path d="M6 23V17a10 10 0 0 1 20 0v6Z"></path><path d="M10 23v-5a6 6 0 0 1 12 0v5"></path></svg>',
        spark: '<svg viewBox="0 0 32 32"><path d="m18 3-9 14h8l-3 12 10-16h-8Z"></path></svg>',
        square: '<svg viewBox="0 0 32 32"><rect x="8" y="8" width="16" height="16" rx="3"></rect><path d="M12 13h8M12 18h6"></path></svg>',
        cloud: '<svg viewBox="0 0 32 32"><path d="M10 23h13a5 5 0 0 0 .7-10A8 8 0 0 0 8.4 15 4.5 4.5 0 0 0 10 23Z"></path></svg>',
        crack: '<svg viewBox="0 0 32 32"><path d="M7 9h18L15 20h10L9 27l6-12H8Z"></path></svg>',
        moon: '<svg viewBox="0 0 32 32"><path d="M22 24A10 10 0 0 1 16 6a9 9 0 1 0 6 18Z"></path></svg>',
        circle: '<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="10"></circle><circle cx="16" cy="16" r="4"></circle></svg>',
        flame: '<svg viewBox="0 0 32 32"><path d="M16 28c5 0 8-3.4 8-8 0-4-2.4-7.2-6-10 .2 3-1 5-3.3 6.5C14 13.8 12.8 11.5 11 9c-.5 4-3 6.7-3 11 0 4.6 3 8 8 8Z"></path></svg>',
        burst: '<svg viewBox="0 0 32 32"><path d="M16 4v6M16 22v6M4 16h6M22 16h6M7.5 7.5l4.2 4.2M20.3 20.3l4.2 4.2M24.5 7.5l-4.2 4.2M11.7 20.3l-4.2 4.2"></path><circle cx="16" cy="16" r="3"></circle></svg>',
        leaf: '<svg viewBox="0 0 32 32"><path d="M26 6C14 7 8 13 8 23c10 0 16-6 18-17Z"></path><path d="M8 23c4-6 8-9 14-12"></path></svg>',
        crescent: '<svg viewBox="0 0 32 32"><path d="M24 22c-8 2-14-2-16-10 4 4 10 5 17 2-3 2-3 5-1 8Z"></path></svg>',
        stack: '<svg viewBox="0 0 32 32"><path d="M8 12h16v5H8zM10 17h12v5H10z"></path><path d="M11 10c1-2 3-3 5-3s4 1 5 3"></path></svg>'
      };
      return icons[icon] || icons.circle;
    }

    function analyticsTrack(name, props = {}) {
      try {
        if (window.zaraz?.track) window.zaraz.track(name, props);
        else if (location.hostname === "localhost" || location.hostname === "127.0.0.1") console.debug("[analytics]", name, props);
      } catch {
        // Analytics must never block the quiz.
      }
    }

    function eventBase(extra = {}) {
      return { quiz_id: quiz.meta.quizId, quiz_version: quiz.meta.quizVersion, session_id: state.sessionId, attempt_id: state.sessionId, ...extra };
    }

    function getOrCreateSession() {
      const existing = safeGet(STORAGE.session);
      if (existing) return existing;
      const session = `kracked-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      safeSet(STORAGE.session, session);
      return session;
    }

    function clearStorage() {
      Object.values(STORAGE).forEach((key) => {
        try {
          localStorage.removeItem(key);
        } catch {
          // Local storage can be unavailable in some privacy modes.
        }
      });
    }

    function readJson(key) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : null;
      } catch {
        return null;
      }
    }

    function writeJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch {
        // Local storage can be unavailable in some privacy modes.
      }
    }

    function safeGet(key) {
      try {
        return localStorage.getItem(key);
      } catch {
        return null;
      }
    }

    function safeSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch {
        // Local storage can be unavailable in some privacy modes.
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
