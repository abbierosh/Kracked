<!doctype html>
<html lang="en-SG">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRacked Dessert Mood Read</title>
  <meta name="description" content="Find out what pastry mood you're craving today.">
  <style>
    :root {
      --ink: #f7f1e8;
      --muted: #b9ad9b;
      --paper: #070605;
      --panel: rgba(13, 11, 9, 0.9);
      --panel-strong: rgba(18, 15, 12, 0.96);
      --cream: #f0e2cf;
      --line: rgba(240, 226, 207, 0.16);
      --line-strong: rgba(240, 226, 207, 0.34);
      --gold: #c6a261;
      --gold-bright: #e4c77f;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(0,0,0,0.92), rgba(0,0,0,0.75) 48%, rgba(0,0,0,0.5)),
        linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.72)),
        url("kracked-bg.png") center right / cover fixed no-repeat,
        var(--paper);
    }

    button, input { font: inherit; }
    a { color: inherit; }

    .app {
      width: min(980px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      align-items: center;
    }

    .shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0,0,0,0.6);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 68px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,0.22);
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(240,226,207,0.2);
      border-radius: 50%;
      background: #050403;
      box-shadow: 0 12px 34px rgba(0,0,0,0.45), 0 0 0 6px rgba(198,162,97,0.06);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .brand-name {
      margin: 0;
      color: var(--gold-bright);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      width: 86px;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(240,226,207,0.15);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--gold);
      transition: width 180ms ease;
    }

    .step-count {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .screen {
      min-height: min(590px, calc(100vh - 160px));
      padding: clamp(24px, 5vw, 46px);
      display: grid;
      align-content: center;
    }

    .screen.intro-screen {
      min-height: auto;
      padding: clamp(22px, 4vw, 34px);
    }

    .screen.result-screen {
      align-content: start;
    }

    .screen.reveal-screen {
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .reading-card {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .reading-mark {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(228,199,127,0.38);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(228,199,127,0.32), transparent 34%),
        rgba(255,255,255,0.035);
      box-shadow: 0 0 34px rgba(198,162,97,0.18);
      animation: pulseRead 1s ease-in-out infinite;
    }

    @keyframes pulseRead {
      0%, 100% { transform: scale(0.96); opacity: 0.72; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    .question-stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 22px;
      align-items: start;
    }

    .question-stage--solo {
      grid-template-columns: 1fr;
    }

    .read-panel {
      position: sticky;
      top: 24px;
      border: 1px solid rgba(228,199,127,0.2);
      border-radius: 12px;
      padding: 13px;
      background:
        radial-gradient(circle at 85% 12%, rgba(228,199,127,0.13), transparent 32%),
        rgba(255,255,255,0.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.025);
    }

    .read-panel p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .read-panel .tag-row {
      margin-top: 10px;
    }

    .intro-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(300px, 0.72fr);
      gap: clamp(22px, 4vw, 38px);
      align-items: stretch;
    }

    .intro-copy {
      display: grid;
      align-content: center;
      padding: clamp(8px, 2vw, 18px) 0;
    }

    .hero-pastry-visual {
      position: relative;
      min-height: 390px;
      overflow: hidden;
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(198,162,97,0.12), rgba(0,0,0,0.24)),
        rgba(255,255,255,0.035);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.55);
    }

    .hero-pastry-visual::after {
      position: absolute;
      inset: 0;
      content: "";
      background:
        linear-gradient(90deg, rgba(13,11,9,0.86), rgba(13,11,9,0.28) 34%, transparent 62%),
        radial-gradient(circle at 72% 48%, transparent 34%, rgba(0,0,0,0.54) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.18), transparent 45%, rgba(0,0,0,0.42));
      pointer-events: none;
    }

    .hero-pastry-visual img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 68% center;
      filter: saturate(0.94) brightness(0.86) contrast(1.04);
      transform: scale(1.01);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--gold-bright);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    h1 {
      max-width: 720px;
      margin-bottom: 18px;
      color: var(--cream);
      font-size: clamp(44px, 7vw, 78px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    h2 {
      max-width: 760px;
      margin-bottom: 10px;
      color: var(--cream);
      font-size: clamp(34px, 5vw, 60px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    h3 {
      color: var(--cream);
      letter-spacing: 0;
    }

    .copy {
      max-width: 650px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.52;
    }

    .meta {
      margin: 22px 0 0;
      color: var(--gold-bright);
      font-size: 13px;
      font-weight: 850;
    }

    .btn {
      min-height: 48px;
      border: 1px solid rgba(240,226,207,0.22);
      border-radius: var(--radius);
      padding: 12px 17px;
      color: var(--ink);
      background: rgba(255,255,255,0.055);
      cursor: pointer;
      font-weight: 850;
      text-decoration: none;
      text-align: center;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(228,199,127,0.62);
      background: rgba(255,255,255,0.08);
    }

    .btn:focus-visible,
    .choice:focus-visible,
    .seg:focus-visible {
      outline: 3px solid rgba(228,199,127,0.92);
      outline-offset: 3px;
    }

    .btn-primary {
      border-color: rgba(198,162,97,0.72);
      color: #130f0a;
      background: linear-gradient(180deg, #edcf84, #bd9350);
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
    }

    .btn-ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .btn[hidden] { display: none; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .choices--checklist {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 9px;
      margin-top: 18px;
    }

    .choice {
      position: relative;
      min-height: 132px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--ink);
      background:
        radial-gradient(circle at 88% 14%, rgba(198,162,97,0.12), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
      cursor: pointer;
      text-align: left;
      display: grid;
      align-content: space-between;
      gap: 16px;
    }

    .choice--compact {
      min-height: 62px;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      align-content: center;
      gap: 10px;
      padding: 12px;
    }

    .choice--compact .choice-icon {
      width: 30px;
      height: 30px;
    }

    .choice--compact .choice-icon svg {
      width: 18px;
      height: 18px;
    }

    .choice--compact .choice-title {
      font-size: 16px;
    }

    .choice--compact .choice-tags {
      grid-column: 2;
      margin-top: -6px;
      font-size: 11px;
    }

    .choice--compact.is-selected::after {
      position: absolute;
      top: 12px;
      right: 12px;
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold-bright);
    }

    .choice::before {
      position: absolute;
      inset: 0;
      content: "";
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(228,199,127,0.28), transparent 34%);
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
    }

    .choice:hover,
    .choice.is-selected {
      border-color: rgba(228,199,127,0.72);
      background:
        linear-gradient(145deg, rgba(198,162,97,0.22), rgba(255,255,255,0.055));
      box-shadow: inset 0 0 0 1px rgba(228,199,127,0.12), 0 16px 34px rgba(0,0,0,0.24);
    }

    .choice:hover::before,
    .choice.is-selected::before {
      opacity: 1;
    }

    .choice-icon {
      position: relative;
      z-index: 1;
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(228,199,127,0.38);
      border-radius: 50%;
      color: var(--gold-bright);
      background: rgba(198,162,97,0.08);
      box-shadow: inset 0 0 18px rgba(198,162,97,0.08);
    }

    .choice-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .choice.is-selected .choice-icon,
    .choice:hover .choice-icon {
      color: #130f0a;
      border-color: rgba(228,199,127,0.9);
      background: var(--gold-bright);
      box-shadow: 0 0 28px rgba(228,199,127,0.22);
    }

    .choice-title {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--cream);
      font-size: clamp(21px, 3vw, 28px);
      font-weight: 900;
      line-height: 1.1;
    }

    .choice-tags {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .helper {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      margin: 14px 0 0;
      color: #f3c0ad;
      font-size: 13px;
      font-weight: 750;
    }

    .tune-grid {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    legend {
      padding: 0;
    }

    .tune-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.55fr) minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background:
        linear-gradient(145deg, rgba(198,162,97,0.1), rgba(255,255,255,0.035));
    }

    .tune-label {
      color: var(--cream);
      font-weight: 900;
    }

    .segments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(240,226,207,0.12);
      border-radius: 10px;
      background: rgba(0,0,0,0.22);
    }

    .seg {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-weight: 800;
    }

    .seg.is-selected {
      border-color: rgba(228,199,127,0.78);
      color: #120f0b;
      background: var(--gold-bright);
    }

    .result-head {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid rgba(228,199,127,0.22);
      border-radius: 14px;
      background:
        radial-gradient(circle at 90% 12%, rgba(228,199,127,0.14), transparent 30%),
        rgba(255,255,255,0.04);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border: 1px solid rgba(228,199,127,0.32);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--gold-bright);
      background: rgba(198,162,97,0.1);
      font-size: 12px;
      font-weight: 850;
    }

    .idea-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.045);
    }

    .idea-panel {
      margin: 20px 0 22px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
    }

    .idea-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .idea-list li {
      border: 1px solid rgba(240,226,207,0.18);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--cream);
      background: rgba(0,0,0,0.16);
      font-size: 13px;
      font-weight: 750;
    }

    .idea-summary {
      margin: 12px 0 0;
      color: var(--cream);
      font-size: 14px;
      line-height: 1.45;
    }

    .did-you-know,
    .match-kicker,
    .why-match {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .did-you-know strong,
    .match-kicker strong,
    .why-match strong {
      color: var(--cream);
    }

    .why-match {
      border-top: 1px solid rgba(240,226,207,0.1);
      padding-top: 14px;
    }

    .signal-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .signal {
      border: 1px solid rgba(228,199,127,0.26);
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--gold-bright);
      background: rgba(198,162,97,0.08);
      font-size: 11px;
      font-weight: 850;
    }

    .result-hero {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(0, 1.1fr);
      gap: 22px;
      align-items: stretch;
    }

    .product-image {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-height: 340px;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background-color: rgba(0,0,0,0.28);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      box-shadow: inset 0 -110px 100px rgba(0,0,0,0.44), inset 0 0 0 1px rgba(255,255,255,0.025);
      filter: saturate(0.92) brightness(0.82) contrast(1.04);
    }

    .product-image::after,
    .mini-image::after {
      position: absolute;
      inset: 0;
      content: "";
      background:
        radial-gradient(circle at 52% 35%, transparent 42%, rgba(0,0,0,0.36)),
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.36));
      pointer-events: none;
    }

    .main-pick {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: clamp(20px, 4vw, 30px);
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 1px rgba(228,199,127,0.07);
    }

    .main-pick h3 {
      overflow-wrap: anywhere;
      margin-bottom: 0;
      color: var(--cream);
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.02;
    }

    .price {
      color: var(--gold-bright);
      font-size: 13px;
      font-weight: 900;
    }

    .reason {
      color: var(--muted);
      line-height: 1.45;
    }

    .discount-box {
      margin-top: 6px;
      border: 1px solid rgba(228,199,127,0.24);
      border-radius: 10px;
      padding: 12px;
      background:
        linear-gradient(145deg, rgba(198,162,97,0.12), rgba(255,255,255,0.035));
    }

    .discount-box h4 {
      margin-bottom: 0;
      color: var(--cream);
      font-size: 15px;
      line-height: 1.25;
    }

    .code-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .discount-code {
      border: 1px solid rgba(228,199,127,0.42);
      border-radius: var(--radius);
      padding: 8px 10px;
      color: var(--gold-bright);
      background: rgba(0,0,0,0.22);
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .secondary {
      margin-top: 22px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .mini-product {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255,255,255,0.045);
    }

    .mini-image {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: 190px;
      overflow: hidden;
      border-radius: 6px;
      background-color: rgba(0,0,0,0.28);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      filter: saturate(0.92) brightness(0.82) contrast(1.04);
    }

    .mini-product > div:last-child {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .mini-product h4 {
      overflow-wrap: anywhere;
      margin-bottom: 6px;
      color: var(--cream);
      font-size: 19px;
      line-height: 1.12;
    }

    .mini-product .reason {
      flex: 1;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .mini-product .btn {
      margin-top: auto;
      min-height: 42px;
      padding: 10px 14px;
      align-self: flex-start;
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      body { background-attachment: scroll; }
      .app { align-items: start; padding: 14px 0; width: min(100% - 20px, 1040px); }
      .topbar { padding: 12px; }
      .brand-logo { width: 44px; height: 44px; }
      .brand-name { font-size: 11px; }
      .progress-track { width: 58px; }
      .screen { min-height: auto; padding: 22px; }
      .screen.intro-screen { padding-block: 30px; }
      .question-stage { grid-template-columns: 1fr; gap: 14px; }
      .read-panel { display: none; }
      .read-panel .eyebrow { margin-bottom: 6px; }
      .read-panel p { margin-bottom: 0; }
      .read-panel .tag-row { margin-top: 8px; }
      .intro-layout { grid-template-columns: 1fr; gap: 18px; }
      .hero-pastry-visual {
        min-height: 150px;
        order: -1;
      }
      h1 { font-size: clamp(42px, 14vw, 62px); }
      h2 { font-size: clamp(32px, 10vw, 48px); }
      .choices { grid-template-columns: 1fr; gap: 10px; }
      .choice { min-height: 104px; padding: 17px; }
      .choice--compact { min-height: 58px; padding: 12px; }
      .choice--compact .choice-tags { grid-column: 2; }
      .tune-row { grid-template-columns: 1fr; }
      .segments { grid-template-columns: 1fr; }
      .result-hero { grid-template-columns: 1fr; }
      .product-image { min-height: 280px; }
      .product-grid { grid-template-columns: 1fr; }
      .mini-image { min-height: 170px; }

      };

    function syncFromHash() {
      const target = parseHash();
      if (target === "result" && state.result) {
        state.step = 7;
        render();
        return;
      }
      if (target.startsWith("q")) {
        const step = Number(target.slice(1));
        if (Number.isInteger(step) && step >= 1 && step <= quiz.meta.questionCount) state.step = Math.min(step, maxReachableStep());
      } else {
        state.step = 0;
      }
      render();
    }

    function parseHash() {
      return (window.location.hash || "#intro").replace("#", "");
    }

    function maxReachableStep() {
      if (!state.answers.family) return 1;
      if (!state.answers.followup) return 2;
      if (!state.answers.textures?.length) return 3;
      if (!state.answers.avoid) return 4;
      return quiz.meta.questionCount;
    }

    function setHash(value) {
      if (window.location.hash !== `#${value}`) window.history.pushState(null, "", `#${value}`);
    }

    function persist() {
      writeJson(STORAGE.state, state);
      if (state.result) writeJson(STORAGE.result, state.result);
      if (state.discountCode) safeSet(STORAGE.code, state.discountCode);
    }

    function render() {
      const isIntro = state.step === 0;
      const isReveal = state.step === 6;
      const isResult = state.step === 7;
      backButton.hidden = state.step <= 1 || isIntro || isReveal || isResult;
      progress.hidden = isIntro || isReveal || isResult;
      progressFill.style.width = isIntro ? "0%" : `${Math.max(0, Math.min(100, (state.step / quiz.meta.questionCount) * 100))}%`;
      stepCopy.textContent = isIntro || isReveal ? "" : `${Math.min(state.step, quiz.meta.questionCount)} of ${quiz.meta.questionCount}`;
      screen.className = `screen${isIntro ? " intro-screen" : ""}${isReveal ? " reveal-screen" : ""}${isResult ? " result-screen" : ""}`;

      if (isIntro) renderIntro();
      else if (isReveal) renderReveal();
      else if (isResult) renderResult();
      else renderQuestion();

      requestAnimationFrame(() => screen.focus({ preventScroll: true }));
      persist();
    }

    function renderReveal() {
      screen.innerHTML = `
        <div class="reading-card" role="status" aria-live="polite">
          <span class="reading-mark" aria-hidden="true"></span>
          <p class="eyebrow">Reading your craving...</p>
          <p class="copy">Checking the texture, mood, and finish.</p>
        </div>
      `;
      window.clearTimeout(renderReveal.timer);
      renderReveal.timer = window.setTimeout(() => {
        state.step = 7;
        setHash("result");
        render();
      }, 950);
    }

    function renderIntro() {
      screen.innerHTML = `
        <div class="intro-layout">
          <div class="intro-copy">
            <p class="eyebrow">Dessert mood read</p>
            <h1>Find out what you&rsquo;re craving.</h1>
            <p class="copy">Cravings change by the day. Pick by instinct and we&rsquo;ll work out the kind of pastry mood you&rsquo;re in.</p>
            <p class="meta">5 quick reads · under 45 seconds</p>
            <div class="actions">
              <button class="btn btn-primary" id="startButton" type="button">Let&rsquo;s find out</button>
            </div>
          </div>
          <div class="hero-pastry-visual">
            <img src="assets/intro-pastry-hero.png" alt="Dark editorial pastry stack" loading="eager" decoding="async" onerror="this.remove()">
          </div>
        </div>
      `;
      document.getElementById("startButton").addEventListener("click", () => {
        trackEvent("quiz_started", eventBase());
        state.step = 1;
        setHash("q1");
        render();
      });
    }

    function renderQuestion() {
      const question = getQuestion();
      const helper = question.helper ? `<p class="helper">${escapeHtml(question.helper)}</p>` : "";
      const readPanel = renderReadPanel();
      screen.innerHTML = `
        <div class="question-stage${readPanel ? "" : " question-stage--solo"}">
          <div>
            <fieldset>
              <legend>
                <p class="eyebrow">${escapeHtml(question.eyebrow)}</p>
                <h2>${escapeHtml(question.prompt)}</h2>
              </legend>
              ${helper}
              ${question.type === "multi" ? renderMulti(question) : question.type === "intensity" ? renderIntensity() : renderSingle(question)}
            </fieldset>
            <p class="error" id="stepError" hidden></p>
            ${question.needsContinue ? `<div class="actions"><button class="btn btn-primary" id="continueButton" type="button">${escapeHtml(question.continueLabel)}</button></div>` : ""}
          </div>
          ${readPanel}
        </div>
      `;

      trackEvent("step_view", eventBase({ step: state.step, step_type: question.type }));
      if (question.type === "multi") bindMulti(question);
      else if (question.type === "intensity") bindIntensity();
      else bindSingle(question);
      if (question.needsContinue) document.getElementById("continueButton").addEventListener("click", continueFromStep);
    }

    function getQuestion() {
      if (state.step === 1) {
        return { type: "single", eyebrow: "Craving read", prompt: "What sounds good today?", options: quiz.topFamilyIds.map((id) => quiz.families[id]), answerKey: "family" };
      }
      if (state.step === 2) {
        const family = quiz.families[state.answers.family] || quiz.families.dark;
        return { type: "single", eyebrow: "Craving read", prompt: family.prompt, options: family.followups, answerKey: "followup" };
      }
      if (state.step === 3) {
        return { type: "multi", eyebrow: "Build the bite", prompt: "Build the bite.", helper: "Pick up to 2 things you need in the first bite.", options: quiz.textureOptions, needsContinue: true, continueLabel: "Continue" };
      }
      if (state.step === 4) {
        return { type: "single", eyebrow: "Avoidance read", prompt: "What are we avoiding today?", options: quiz.avoidanceOptions, answerKey: "avoid" };
      }
      if (state.step === 5) {
        return { type: "intensity", eyebrow: "Tuning", prompt: "Dial the craving.", needsContinue: true, continueLabel: "Reveal my read" };
      }
      return { type: "intensity", eyebrow: "Tuning", prompt: "Dial the craving.", needsContinue: true, continueLabel: "Reveal my read" };
    }

    function renderSingle(question) {
      return `<div class="choices" role="group" aria-label="${escapeHtml(question.prompt)}">
        ${question.options.map((option) => choiceButton(option, state.answers[question.answerKey] === option.id)).join("")}
      </div>`;
    }

    function renderMulti(question) {
      const selected = new Set(state.answers.textures || []);
      return `<div class="choices choices--checklist" role="group" aria-label="${escapeHtml(question.prompt)}">
        ${question.options.map((option) => choiceButton(option, selected.has(option.id), true)).join("")}
      </div>`;
    }

    function renderReadPanel() {
      const tags = currentReadTags();
      if (!tags.length) return "";
      return `
        <aside class="read-panel" aria-label="Selected read details">
          <p class="eyebrow">Building your read</p>
          <div class="tag-row">${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        </aside>
      `;
    }

    function currentReadTags() {
      const tags = [];
      if (!state.answers.family) return tags;
      const family = quiz.families[state.answers.family] || quiz.families.dark;
      const followup = family.followups.find((option) => option.id === state.answers.followup);
      const avoid = quiz.avoidanceOptions.find((option) => option.id === state.answers.avoid);
      tags.push(family.title);
      if (followup) tags.push(followup.title);
      (state.answers.textures || []).slice(0, 2).forEach((id) => {
        const texture = quiz.textureOptions.find((option) => option.id === id);
        if (texture) tags.push(texture.title);
      });
      if (avoid) tags.push(`Avoiding ${avoid.title.toLowerCase()}`);
      if (state.step >= 5 && state.answers.intensity?.richness) tags.push(labelForIntensity("richness"));
      return tags.slice(0, 4);
    }

    function choiceButton(option, selected, checkbox = false) {
      return `
        <button class="choice${checkbox ? " choice--compact" : ""}${selected ? " is-selected" : ""}" type="button" data-option="${option.id}" aria-pressed="${selected}" ${checkbox ? `aria-label="${escapeHtml(option.title)} ${selected ? "selected" : "not selected"}"` : ""}>
          <span class="choice-icon" aria-hidden="true">${iconSvg(option.icon)}</span>
          <span class="choice-title">${escapeHtml(option.title)}</span>
          <span class="choice-tags">${escapeHtml(option.tags)}</span>
        </button>
      `;
    }

    function renderIntensity() {
      const controls = [
        ["sweetness", "Sweetness", [["gentle", "gentle"], ["balanced", "balanced"], ["full", "full-send"]]],
        ["richness", "Richness", [["light", "light"], ["medium", "medium"], ["dense", "dense"]]],
        ["familiarity", "Adventure", [["classic", "classic"], ["twist", "twist"], ["adventurous", "adventurous"]]]
      ];
      return `<div class="tune-grid">
        ${controls.map(([key, label, options]) => `
          <div class="tune-row">
            <span class="tune-label">${label}: ${escapeHtml(labelForIntensity(key))}</span>
            <div class="segments" role="group" aria-label="${label}">
              ${options.map(([value, text]) => `<button class="seg${state.answers.intensity[key] === value ? " is-selected" : ""}" type="button" data-intensity="${key}" data-value="${value}">${text}</button>`).join("")}
            </div>
          </div>
        `).join("")}
      </div>`;
    }

    function labelForIntensity(key) {
      const labels = {
        sweetness: { gentle: "gentle", balanced: "balanced", full: "full-send" },
        richness: { light: "light", medium: "medium", dense: "dense" },
        familiarity: { classic: "classic", twist: "twist", adventurous: "adventurous" }
      };
      return labels[key]?.[state.answers.intensity[key]] || state.answers.intensity[key];
    }

    function bindSingle(question) {
      screen.querySelectorAll(".choice").forEach((button) => {
        button.addEventListener("click", () => {
          state.answers[question.answerKey] = button.dataset.option;
          if (question.answerKey === "family") {
            state.answers.followup = "";
          }
          const eventName = question.answerKey === "family" ? "craving_lane_selected" : question.answerKey === "avoid" ? "avoidance_selected" : "branch_answer_selected";
          trackEvent(eventName, eventBase({ step: state.step, answer_id: button.dataset.option }));
          setTimeout(() => advance(), 150);
        });
      });
    }

    function bindMulti() {
      screen.querySelectorAll(".choice").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.option;
          const selected = new Set(state.answers.textures || []);
          if (selected.has(id)) selected.delete(id);
          else if (selected.size < 2) selected.add(id);
          else {
            showError("Pick up to 2 textures.");
            return;
          }
          state.answers.textures = [...selected];
          trackEvent("texture_selected", eventBase({ textures: state.answers.textures.join(",") }));
          renderQuestion();
        });
      });
    }

    function bindIntensity() {
      screen.querySelectorAll(".seg").forEach((button) => {
        button.addEventListener("click", () => {
          state.answers.intensity[button.dataset.intensity] = button.dataset.value;
          trackEvent("intensity_set", eventBase({ key: button.dataset.intensity, value: button.dataset.value }));
          renderQuestion();
        });
      });
    }

    function continueFromStep() {
      if (state.step === 3 && (!state.answers.textures || state.answers.textures.length === 0)) {
        showError("Pick at least 1 texture.");
        return;
      }
      advance();
    }

    function showError(message) {
      const error = document.getElementById("stepError");
      error.textContent = message;
      error.hidden = false;
    }

    function advance() {
      if (state.step < quiz.meta.questionCount) {
        state.step += 1;
        setHash(`q${state.step}`);
        render();
      } else {
        completeQuiz();
      }
    }

    function goBack() {
      if (state.step <= 1) return;
      state.step -= 1;
      setHash(`q${state.step}`);
      render();
    }

    function completeQuiz() {
      state.result = computeResult();
      state.discountCode = assignDiscountCode();
      state.step = 6;
      writeJson(STORAGE.result, state.result);
      safeSet(STORAGE.code, state.discountCode);
      trackEvent("result_generated", eventBase({
        first_craving_lane: state.answers.family,
        branch_answer: state.answers.followup,
        textures: (state.answers.textures || []).join(","),
        sweetness: state.answers.intensity.sweetness,
        richness: state.answers.intensity.richness,
        adventure: state.answers.intensity.familiarity,
        avoiding: state.answers.avoid,
        final_profile: state.result.profile.id,
        main_match: state.result.main.product.id,
        main_match_name: productDisplayName(state.result.main.product),
        unmet_craving_tags: state.result.unmetTags.join(","),
        muse_signals: state.result.museSignals.join(","),
        discount_code: state.discountCode,
        confidence: state.result.confidence
      }));
      render();
    }

    function computeResult() {
      const { dims, family, followup } = collectRead();
      const profileFamily = resolveProfileFamily(family, followup);
      const profile = {
        id: profileFamily.id,
        name: profileFamily.profile,
        description: profileDescription(profileFamily, dims),
        ideas: profileFamily.ideas,
        ideaSummary: profileFamily.ideaSummary,
        didYouKnow: profileFamily.didYouKnow,
        tags: resultTags(dims)
      };

      const rankedProducts = quiz.products
        .map((product) => ({ product, score: scoreProduct(dims, product), reason: productReason(profileFamily.id, product.id, dims) }))
        .sort((a, b) => b.score - a.score);
      const main = rankedProducts[0];
      const secondary = rankedProducts.slice(1, 3);
      const gap = main.score - rankedProducts[1].score;
      const unmetTags = [...new Set([...(profileFamily.unmetTags || []), ...unmetTagsFromDims(dims)])];
      const museSignals = [...new Set([...(quiz.museSignals[profileFamily.id] || []), ...museSignalsFromDims(dims)])];
      const confidence = profileFamily.id === "local" ? "weak" : gap >= 5 ? "strong" : gap >= 2 ? "medium" : "weak";
      return { profile, dims, main, secondary, confidence, unmetTags, museSignals, matchSignals: matchSignals(dims), branch: followup?.id || "" };
    }

    function collectRead() {
      const dims = {};
      const family = quiz.families[state.answers.family] || quiz.families.dark;
      const followup = family.followups.find((option) => option.id === state.answers.followup);
      addDims(dims, family.dims);
      addDims(dims, followup?.dims);
      (state.answers.textures || []).forEach((id) => addDims(dims, quiz.textureOptions.find((option) => option.id === id)?.dims));
      addDims(dims, quiz.avoidanceOptions.find((option) => option.id === state.answers.avoid)?.dims);
      addIntensityDims(dims);
      return { dims, family, followup };
    }

    function resolveProfileFamily(family, followup) {
      if (state.answers.avoid === "tooSweet" && state.answers.intensity?.sweetness !== "full") return quiz.families.gentle;
      if (family.id !== "discovery") return family;
      if (followup?.id === "nostalgia") return quiz.families.local;
      return quiz.families.novelty;
    }

    function profileDescription(profileFamily, dims = {}) {
      const avoid = state.answers.avoid;
      const notes = {
        tooSweet: "You’re not looking for something sugar-heavy today, so balance and a cleaner finish matter more than just maximum sweetness.",
        tooHeavy: "You want dessert to lift, not sit heavy, which is why fruit, cream-light texture, or crumble energy makes more sense than full dense chocolate.",
        tooPlain: "You want the bake to do something. A simple pastry is fine, but today it needs texture, contrast, or at least a small twist.",
        tooDry: "You’re clearly after softness and moisture — soft centres, cream, or anything that does not eat like a dry biscuit.",
        tooSafe: "You do not really want the safest thing on the counter. Something layered, odd, or a little extra is doing more for you today.",
        tooCreamy: "You’re not in the mood for anything too soft or cream-heavy, so bite, crumb, chew, or a cleaner finish starts to matter."
      };
      const intensity = [];
      if ((dims.rich || 0) >= 5) intensity.push("rich");
      if ((dims.soft || 0) >= 4) intensity.push("soft");
      if ((dims.chew || 0) >= 4) intensity.push("chewy");
      if ((dims.adventurous || 0) >= 3 || (dims.novelty || 0) >= 4) intensity.push("a bit bold");
      const tail = notes[avoid] || (intensity.length ? `Your answers also lean ${intensity.slice(0, 2).join(" and ")}, so the match needs to feel specific rather than random.` : "");
      return [profileFamily.description, tail].filter(Boolean).join(" ");
    }

    function addDims(target, dims = {}) {
      Object.entries(dims).forEach(([key, value]) => {
        target[key] = (target[key] || 0) + value;
      });
    }

    function addIntensityDims(dims) {
      const { sweetness, richness, familiarity } = state.answers.intensity;
      if (sweetness === "gentle") addDims(dims, { sweet: -1, familiarity: 1 });
      if (sweetness === "balanced") addDims(dims, { sweet: 1 });
      if (sweetness === "full") addDims(dims, { sweet: 3, rich: 1 });
      if (richness === "light") addDims(dims, { rich: -1, cream: 1 });
      if (richness === "medium") addDims(dims, { rich: 1 });
      if (richness === "dense") addDims(dims, { rich: 3, dark: 1 });
      if (familiarity === "classic") addDims(dims, { familiarity: 3 });
      if (familiarity === "twist") addDims(dims, { novelty: 1, adventurous: 1 });
      if (familiarity === "adventurous") addDims(dims, { novelty: 2, adventurous: 3 });
    }

    function scoreProduct(dims, product) {
      return Object.entries(product.dims).reduce((sum, [key, value]) => sum + (dims[key] || 0) * value, 0);
    }

    function productReason(familyId, productId, dims = {}) {
      if (familyId === "local") {
        if (productId === "streuseltalers") return "KRacked does not have a kaya, pandan, or sesame bake right now, but this is the closest current match for a brighter, layered pastry profile with fruit and crumble.";
        if (productId === "garlic_butter_shio_pan") return "KRacked does not have a kaya or pandan bake right now, but this gives you the salt-butter comfort your answers kept pointing to.";
        if (productId === "brookies") return "KRacked does not have a kaya, pandan, or sesame bake right now, but this is the closest current bridge if you wanted familiar flavours with less-safe, layered energy.";
        if (productId === "triple_chocolate_cookies") return "KRacked does not have a kaya, pandan, or sesame bake right now, but this is the closest current bridge if your familiar-lane answer also leaned dark and chewy.";
        return "KRacked does not have a kaya, pandan, or sesame bake right now, but this is the closest live bridge for the soft, familiar side of your result.";
      }
      const reasons = {
        hot_cocoa_cookies: "This fits because you’re leaning toward cocoa comfort: soft centre, rich finish, and something that feels more like a proper dessert than a snack.",
        brookies: "This fits because you’re asking for contrast — brownie density, cookie chew, and a little “why not?” energy in one bite.",
        tiramisu_rolls: "This fits because you’re leaning creamy, coffee-led, and soft — the kind of dessert that feels rich without being heavy.",
        french_brioche_loaf: "This fits because you’re craving the soft, buttery side of pastry — warm, simple, and not too loud.",
        streuseltalers: "This fits because you’re leaning brighter and more layered: fruit, crumble, and a finish that feels less heavy.",
        triple_chocolate_cookies: "This fits because you want chocolate with weight — deep cocoa, chew, and a full dessert finish.",
        marble_praline_hazelnut_cookies: "This fits because you’re leaning into cocoa depth with a nutty, roasted edge.",
        kannelbullar: "This fits because you’re pointing toward warm bakery comfort: soft dough, spice, and a familiar finish.",
        brioches_pepites_chocolat: "This fits because you want soft bread comfort with enough chocolate to keep it feeling like a treat.",
        garlic_butter_shio_pan: "This fits because your answers point to butter, salt, and comfort without going overly sweet."
      };
      return reasons[productId] || "Closest fit on the current menu.";
    }

    function unmetTagsFromDims(dims) {
      const tags = [];
      if ((dims.local || 0) >= 5) tags.push("kaya-pandan-black-sesame");
      if ((dims.bright || 0) >= 5) tags.push("yuzu-citrus");
      if ((dims.salty || 0) >= 3 && (dims.butter || 0) >= 3) tags.push("savoury-buttery");
      if ((dims.crumbly || 0) >= 2 || (dims.fruity || 0) >= 4) tags.push("fruit-crumble");
      if ((dims.novelty || 0) >= 5) tags.push("hybrid-stuffed");
      return tags;
    }

    function museSignalsFromDims(dims) {
      const signals = [];
      if ((dims.local || 0) >= 4) signals.push("kaya", "pandan", "black sesame", "coconut");
      if ((dims.bright || 0) >= 4 || (dims.fruity || 0) >= 3) signals.push("lemon", "berry", "yuzu", "fruit crumble");
      if ((dims.novelty || 0) >= 4) signals.push("stuffed", "limited", "hybrid");
      if ((dims.salty || 0) >= 3) signals.push("sweet-savoury", "shio pan");
      if ((dims.nutty || 0) >= 3) signals.push("hazelnut", "black sesame", "peanut");
      return signals;
    }

    function matchSignals(dims) {
      return Object.entries(dims)
        .filter(([, value]) => value > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 4)
        .map(([key]) => ({
          dark: "cocoa",
          butter: "buttery",
          cream: "creamy",
          bright: "bright",
          local: "nostalgic",
          novelty: "layered",
          chew: "chewy",
          soft: "soft",
          flaky: "flaky",
          creamy: "smooth",
          crumbly: "crumbly",
          fruity: "fruit-led",
          nutty: "nutty",
          salty: "salty",
          sweet: "sweet",
          rich: "rich",
          adventurous: "adventurous",
          familiarity: "familiar"
        }[key] || key));
    }

    function resultTags(dims) {
      return Object.entries(dims)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([key]) => ({
          lateNight: "late-night",
          novelty: "curveball",
          adventurous: "adventurous",
          familiarity: "familiar",
          brunch: "brunch",
          chew: "chewy",
          soft: "soft",
          rich: "rich",
          bright: "bright",
          fruity: "fruity",
          butter: "buttery",
          cream: "creamy",
          dark: "cocoa",
          local: "nostalgic",
          sharing: "sharing"
        }[key] || key));
    }

    function productDisplayName(product = {}) {
      return (product.name || "")
        .replace(/^2\s+Streuseltalers \/ Lemon Blueberry Crumble$/, "Streuseltalers")
        .replace(/^8\s+Brookies$/, "Brookies")
        .replace(/^6\s+Hot Cocoa Cookies$/, "Hot Cocoa Cookies")
        .replace(/^3\s+Tiramisu Rolls$/, "Tiramisu Rolls")
        .replace(/^3\s+Marble Praline Hazelnut Cookies$/, "Marble Praline Hazelnut Cookies")
        .replace(/^3\s+Brioches aux pépites de chocolat$/, "Brioches aux pépites de chocolat")
        .replace(/^\d+\s+/, "");
    }

    function productQuantityLabel(product = {}) {
      if (product.quantityLabel) return product.quantityLabel;
      const match = product.name?.match(/^(\d+)\s+/);
      if (!match) return "";
      const quantity = match[1];
      if (product.id === "brookies" || product.id === "hot_cocoa_cookies") return `Box of ${quantity}`;
      return `Set of ${quantity}`;
    }

    function renderResult() {
      const result = state.result || readJson(STORAGE.result);
      if (!result) {
        state.step = 0;
        setHash("intro");
        render();
        return;
      }
      state.result = result;
      const label = result.confidence === "weak" ? "Closest KRacked pick" : "KRacked would point you here";
      const code = assignDiscountCode();
      const mainName = productDisplayName(result.main.product);
      const mainQuantity = productQuantityLabel(result.main.product);
      const matchSignalsHtml = (result.matchSignals || matchSignals(result.dims || {}))
        .slice(0, 4)
        .map((signal) => `<span class="signal">${escapeHtml(signal)}</span>`)
        .join("");
      screen.innerHTML = `
        <div class="result-head">
          <p class="eyebrow">Your craving profile is&hellip;</p>
          <h2>${escapeHtml(result.profile.name)}</h2>
          <p class="copy">${escapeHtml(result.profile.description)}</p>
          <div class="tag-row">${result.profile.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        </div>

        <section class="idea-panel">
          <p class="eyebrow">You'd probably like...</p>
          <ul class="idea-list">${result.profile.ideas.map((idea) => `<li>${escapeHtml(idea)}</li>`).join("")}</ul>
          <p class="idea-summary">${escapeHtml(result.profile.ideaSummary || "Basically, you’re after bakes that match the texture, mood, and finish you picked.")}</p>
          <p class="did-you-know"><strong>Did you know:</strong> ${escapeHtml(result.profile.didYouKnow)}</p>
        </section>

        <div class="result-hero">
          <div class="product-image" style="background-image: url('${result.main.product.image}')"></div>
          <article class="main-pick">
            <p class="eyebrow">${escapeHtml(label)}</p>
            <p class="match-kicker"><strong>If we had to point you to one KRacked pick right now, it’d be this.</strong></p>
            <h3>${escapeHtml(mainName)}</h3>
            ${mainQuantity ? `<p class="meta">${escapeHtml(mainQuantity)}</p>` : ""}
            <p class="price">${escapeHtml(result.main.product.priceLabel)}</p>
            <a class="btn btn-primary" href="${result.main.product.linkUrl}" target="_blank" rel="noopener" data-product-id="${result.main.product.id}" data-slot="main">Order this bake</a>
            <div class="why-match">
              <strong>Why this match?</strong>
              <div class="signal-row">${matchSignalsHtml}</div>
              <p>${escapeHtml(result.main.reason)}</p>
            </div>
            <div class="discount-box">
              <p class="eyebrow">5% off your first match</p>
              <h4>Use code ${escapeHtml(code)} for 5% off your order.</h4>
              <div class="code-row">
                <span class="discount-code">${escapeHtml(code)}</span>
                <button class="btn" id="copyCodeButton" type="button">Copy code</button>
              </div>
              <p class="note">Code validity will be confirmed before launch.</p>
            </div>
          </article>
        </div>

        <section class="secondary">
          <p class="eyebrow">Also worth a look</p>
          <div class="product-grid">${result.secondary.map((item) => secondaryCard(item)).join("")}</div>
        </section>

        <div class="actions">
          <button class="btn" id="retakeButton" type="button">Retake</button>
          <button class="btn btn-ghost" id="copyResultButton" type="button">Copy my result</button>
        </div>
        <p class="note">Not today&rsquo;s mood? Retake the read.</p>
      `;
      bindResultActions(result, code);
    }

    function secondaryCard(item) {
      const name = productDisplayName(item.product);
      const quantity = productQuantityLabel(item.product);
      return `
        <article class="mini-product">
          <div class="mini-image" style="background-image: url('${item.product.image}')"></div>
          <div>
            <p class="eyebrow">Worth a look</p>
            <h4>${escapeHtml(name)}</h4>
            ${quantity ? `<p class="meta">${escapeHtml(quantity)}</p>` : ""}
            <p class="reason">${escapeHtml(item.reason)}</p>
            <a class="btn" href="${item.product.linkUrl}" target="_blank" rel="noopener" data-product-id="${item.product.id}" data-slot="secondary">View bake</a>
          </div>
        </article>
      `;
    }

    function bindResultActions(result, code) {
      screen.querySelectorAll("[data-product-id]").forEach((link) => {
        link.addEventListener("click", () => {
          const product = productById[link.dataset.productId] || result.main.product;
          trackEvent("order_clicked", eventBase({ product_id: link.dataset.productId, product_name: productDisplayName(product), slot: link.dataset.slot }));
        });
      });
      document.getElementById("retakeButton").addEventListener("click", () => {
        trackEvent("retake_quiz", eventBase({ profile: result.profile.id }));
        resetQuiz();
      });
      document.getElementById("copyResultButton").addEventListener("click", async () => {
        trackEvent("copy_result", eventBase({ profile: result.profile.id }));
        await copyText(shareText(result), "copyResultButton");
      });
      document.getElementById("copyCodeButton").addEventListener("click", async () => {
        trackEvent("discount_copied", eventBase({ code }));
        await copyText(`Use code ${code} for 5% off your order.`, "copyCodeButton", `Code: ${code}`);
      });
    }

    function shareText(result) {
      const profileLine = {
        dark: "apparently I want cocoa depth, soft centres, and dessert with actual weight",
        butter: "apparently I want butter, soft crumb, and bakery comfort",
        cream: "apparently I want cream, coffee, cocoa dust, and a mellow finish",
        bright: "apparently I want fruit, crumble, and something that does not sit heavy",
        local: "apparently I want familiar flavours with a bit of curiosity",
        novelty: "apparently I like layered chaos and desserts that do not play it too safe",
        gentle: "apparently I want something soft, balanced, and easy to finish"
      }[result.profile.id] || `apparently I like ${result.profile.ideas.slice(0, 2).join(" and ")}`;
      return `My KRacked craving profile is ${result.profile.name} — ${profileLine}. Closest KRacked pick: ${productDisplayName(result.main.product)}.`;
    }

    function resetQuiz() {
      clearStorage();
      state = defaultState();
      setHash("intro");
      render();
    }

    function assignDiscountCode() {
      if (state.discountCode) return state.discountCode;
      const stored = safeGet(STORAGE.code);
      if (stored && quiz.discountCodes.includes(stored)) {
        state.discountCode = stored;
        return stored;
      }
      const code = quiz.discountCodes[Math.floor(Math.random() * quiz.discountCodes.length)];
      state.discountCode = code;
      safeSet(STORAGE.code, code);
      return code;
    }

    async function copyText(text, buttonId, fallbackText = "Copy failed") {
      const button = document.getElementById(buttonId);
      const original = button.textContent;
      try {
        if (!navigator.clipboard) throw new Error("Clipboard unavailable");
        await navigator.clipboard.writeText(text);
        button.textContent = "Copied";
      } catch {
        button.textContent = fallbackText;
      }
      setTimeout(() => {
        button.textContent = original;
      }, 1800);
    }

    function iconSvg(icon) {
      const icons = {
        cocoa: '<svg viewBox="0 0 32 32"><path d="M15 4c-4 5-7 9-7 14a7 7 0 0 0 14 0c0-5-3-9-7-14Z"></path><rect x="18" y="18" width="7" height="7" rx="1.5"></rect></svg>',
        bread: '<svg viewBox="0 0 32 32"><path d="M6 22v-4a10 10 0 0 1 20 0v4Z"></path><path d="M10 22v-5a6 6 0 0 1 12 0v5"></path><path d="M8 25h16"></path></svg>',
        cup: '<svg viewBox="0 0 32 32"><path d="M9 17c0-4 3-7 7-7 3 0 6 2 6 5s-2.5 5-6 5h-5"></path><path d="M11 22h10"></path><path d="M23 14h2a3 3 0 0 1 0 6h-3"></path></svg>',
        citrus: '<svg viewBox="0 0 32 32"><path d="M8 24A16 16 0 0 1 24 8v16Z"></path><path d="M13 22 24 11M16 24V13M21 24V10"></path><path d="M6 8l2 2M5 15h3M12 5v3"></path></svg>',
        pandan: '<svg viewBox="0 0 32 32"><path d="M25 6C14 7 8 13 8 24c9 0 15-6 17-18Z"></path><path d="M8 24c4-6 8-10 15-13"></path><circle cx="22" cy="23" r="1.4"></circle><circle cx="18" cy="25" r="1.4"></circle></svg>',
        wildcard: '<svg viewBox="0 0 32 32"><path d="M7 9h8l-3 6h7l-6 10"></path><path d="m22 7 1.2 3.1L26 11l-2.8 1-1.2 3-1.2-3-2.8-1 2.8-.9Z"></path></svg>',
        drop: '<svg viewBox="0 0 32 32"><path d="M16 4C12 9 9 13 9 18a7 7 0 0 0 14 0c0-5-3-9-7-14Z"></path><path d="M13 21c1.2 1.3 3.2 1.7 5 .6"></path></svg>',
        swirl: '<svg viewBox="0 0 32 32"><path d="M8 17c0-5 4-9 9-9 4 0 7 3 7 6 0 4-3 6-7 6h-5"></path><path d="M12 20c0 3 3 5 6 5 2.8 0 5-1.4 6-3.8"></path></svg>',
        arch: '<svg viewBox="0 0 32 32"><path d="M6 23V17a10 10 0 0 1 20 0v6Z"></path><path d="M10 23v-5a6 6 0 0 1 12 0v5"></path></svg>',
        spark: '<svg viewBox="0 0 32 32"><path d="m18 3-9 14h8l-3 12 10-16h-8Z"></path></svg>',
        square: '<svg viewBox="0 0 32 32"><rect x="8" y="8" width="16" height="16" rx="3"></rect><path d="M12 13h8M12 18h6"></path></svg>',
        cloud: '<svg viewBox="0 0 32 32"><path d="M10 23h13a5 5 0 0 0 .7-10A8 8 0 0 0 8.4 15 4.5 4.5 0 0 0 10 23Z"></path></svg>',
        crack: '<svg viewBox="0 0 32 32"><path d="M7 9h18L15 20h10L9 27l6-12H8Z"></path></svg>',
        moon: '<svg viewBox="0 0 32 32"><path d="M22 24A10 10 0 0 1 16 6a9 9 0 1 0 6 18Z"></path></svg>',
        circle: '<svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="10"></circle><circle cx="16" cy="16" r="4"></circle></svg>',
        flame: '<svg viewBox="0 0 32 32"><path d="M16 28c5 0 8-3.4 8-8 0-4-2.4-7.2-6-10 .2 3-1 5-3.3 6.5C14 13.8 12.8 11.5 11 9c-.5 4-3 6.7-3 11 0 4.6 3 8 8 8Z"></path></svg>',
        burst: '<svg viewBox="0 0 32 32"><path d="M16 4v6M16 22v6M4 16h6M22 16h6M7.5 7.5l4.2 4.2M20.3 20.3l4.2 4.2M24.5 7.5l-4.2 4.2M11.7 20.3l-4.2 4.2"></path><circle cx="16" cy="16" r="3"></circle></svg>',
        leaf: '<svg viewBox="0 0 32 32"><path d="M26 6C14 7 8 13 8 23c10 0 16-6 18-17Z"></path><path d="M8 23c4-6 8-9 14-12"></path></svg>',
        crescent: '<svg viewBox="0 0 32 32"><path d="M24 22c-8 2-14-2-16-10 4 4 10 5 17 2-3 2-3 5-1 8Z"></path></svg>',
        stack: '<svg viewBox="0 0 32 32"><path d="M8 12h16v5H8zM10 17h12v5H10z"></path><path d="M11 10c1-2 3-3 5-3s4 1 5 3"></path></svg>'
      };
      return icons[icon] || icons.circle;
    }

    function trackEvent(name, props = {}) {
      analyticsTrack(name, props);
    }

    function analyticsTrack(name, props = {}) {
      try {
        if (window.zaraz?.track) window.zaraz.track(name, props);
        else if (location.hostname === "localhost" || location.hostname === "127.0.0.1") console.debug("[analytics]", name, props);
      } catch {
        // Analytics must never block the quiz.
      }
    }

    function eventBase(extra = {}) {
      return { quiz_id: quiz.meta.quizId, quiz_version: quiz.meta.quizVersion, session_id: state.sessionId, attempt_id: state.sessionId, ...extra };
    }

    function getOrCreateSession() {
      const existing = safeGet(STORAGE.session);
      if (existing) return existing;
      const session = `kracked-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      safeSet(STORAGE.session, session);
      return session;
    }

    function clearStorage() {
      Object.values(STORAGE).forEach((key) => {
        try {
          localStorage.removeItem(key);
        } catch {
          // Local storage can be unavailable in some privacy modes.
        }
      });
    }

    function readJson(key) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : null;
      } catch {
        return null;
      }
    }

    function writeJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch {
        // Local storage can be unavailable in some privacy modes.
      }
    }

    function safeGet(key) {
      try {
        return localStorage.getItem(key);
      } catch {
        return null;
      }
    }

    function safeSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch {
        // Local storage can be unavailable in some privacy modes.
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
